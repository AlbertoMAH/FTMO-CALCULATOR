name: Flutter Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Repair and Build
        run: |
          # 1. On se place là où est le projet
          cd $(find . -name pubspec.yaml -exec dirname {} \;)
          
          # 2. On force Flutter à recréer les fichiers Android manquants (comme gradlew)
          flutter create . --platforms android
          
          # 3. On nettoie les résidus
          rm -f android/local.properties
          [ -f android/gradle.properties ] && sed -i '/org.gradle.java.home/d' android/gradle.properties || true
          
          # 4. On s'assure que c'est exécutable
          chmod +x android/gradlew
          
          # 5. Build
          flutter pub get
          flutter config --jdk-dir $JAVA_HOME
          flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-release-apk
          path: "**/build/app/outputs/flutter-apk/*.apk"

